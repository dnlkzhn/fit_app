<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fit App - Register</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="page">
		<div class="card">
			<h1>Fit App</h1>
			<p class="subtle">Create your account.</p>

			<div id="message"></div>

			<form id="register-form">
				<label for="username">Username</label>
				<input id="username" name="username" type="text" required minlength="3">

				<label for="email">Email</label>
				<input id="email" name="email" type="email" required>

				<label for="password">Password</label>
				<input id="password" name="password" type="password" required minlength="6" maxlength="72">

				<button type="submit">Register</button>
			</form>

			<p class="footer">Already have an account? <a href="login.html">Login</a></p>
		</div>
	</div>

	<script>
		const API_URL = "/api";

		const form = document.getElementById("register-form");
		const message = document.getElementById("message");

		function showMessage(text, type) {
			message.className = `alert ${type}`;
			message.textContent = text;
		}

		form.addEventListener("submit", async (event) => {
			event.preventDefault();
			showMessage("", "");

			const payload = {
				username: document.getElementById("username").value.trim(),
				email: document.getElementById("email").value.trim(),
				password: document.getElementById("password").value,
			};

			try {
				const response = await fetch(`${API_URL}/register`, {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify(payload),
				});

				if (!response.ok) {
					const error = await response.json();
					showMessage(error.detail || "Registration failed", "error");
					return;
				}

				showMessage("Account created. Please login.", "success");
				setTimeout(() => {
					window.location.href = "login.html";
				}, 800);
			} catch (error) {
				showMessage("Server not reachable", "error");
			}
		});
	</script>
</body>
</html>
